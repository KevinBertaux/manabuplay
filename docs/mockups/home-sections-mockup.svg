<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="hero" x1="240" y1="96" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5faff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4ecdc4"/>
      <stop offset="1" stop-color="#6fe7dd"/>
    </linearGradient>
    <linearGradient id="soon" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a29bfe"/>
      <stop offset="1" stop-color="#6c5ce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#243041" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>

  <rect x="0" y="0" width="1440" height="74" fill="#ffffff"/>
  <text x="36" y="46" font-family="Segoe UI, sans-serif" font-size="30" font-weight="800" fill="#1f385f">ManabuPlay</text>
  <g font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#243041">
    <text x="1100" y="46">Math</text>
    <text x="1190" y="46">Langues</text>
  </g>

  <rect x="240" y="96" width="960" height="170" rx="22" fill="url(#hero)" stroke="#d9e1ed" filter="url(#shadow)"/>
  <text x="286" y="162" font-family="Segoe UI, sans-serif" font-size="58" font-weight="900" fill="#1f385f">Choisis ta matière</text>
  <text x="286" y="207" font-family="Segoe UI, sans-serif" font-size="28" font-weight="500" fill="#4b5f79">Des révisions courtes, claires et adaptées aux enfants.</text>
  <rect x="286" y="222" width="210" height="52" rx="14" fill="url(#cta)"/>
  <text x="344" y="256" font-family="Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#ffffff">Commencer</text>

  <text x="240" y="330" font-family="Segoe UI, sans-serif" font-size="40" font-weight="900" fill="#1f385f">Mathématiques</text>
  <g filter="url(#shadow)">
    <rect x="240" y="352" width="460" height="178" rx="18" fill="url(#card)" stroke="#d9e1ed"/>
    <text x="272" y="404" font-family="Segoe UI, sans-serif" font-size="32" font-weight="800" fill="#243041">Tables de multiplication</text>
    <text x="272" y="442" font-family="Segoe UI, sans-serif" font-size="23" fill="#4b5f79">Tables 0 à 11, score et meilleure série.</text>
    <rect x="272" y="463" width="190" height="46" rx="12" fill="url(#cta)"/>
    <text x="318" y="493" font-family="Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#ffffff">S'entraîner</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="740" y="352" width="460" height="178" rx="18" fill="url(#card)" stroke="#d9e1ed"/>
    <text x="772" y="404" font-family="Segoe UI, sans-serif" font-size="32" font-weight="800" fill="#243041">Divisions</text>
    <text x="772" y="442" font-family="Segoe UI, sans-serif" font-size="23" fill="#4b5f79">Exercices progressifs.</text>
    <rect x="772" y="463" width="150" height="46" rx="12" fill="url(#soon)"/>
    <text x="812" y="493" font-family="Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#ffffff">Bientôt</text>
  </g>

  <text x="240" y="600" font-family="Segoe UI, sans-serif" font-size="40" font-weight="900" fill="#1f385f">Langues</text>
  <g filter="url(#shadow)">
    <rect x="240" y="622" width="460" height="178" rx="18" fill="url(#card)" stroke="#d9e1ed"/>
    <text x="272" y="674" font-family="Segoe UI, sans-serif" font-size="32" font-weight="800" fill="#243041">Anglais</text>
    <text x="272" y="712" font-family="Segoe UI, sans-serif" font-size="23" fill="#4b5f79">Flashcards, prononciation audio, listes.</text>
    <rect x="272" y="733" width="150" height="46" rx="12" fill="url(#cta)"/>
    <text x="312" y="763" font-family="Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#ffffff">Réviser</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="740" y="622" width="460" height="178" rx="18" fill="url(#card)" stroke="#d9e1ed"/>
    <text x="772" y="674" font-family="Segoe UI, sans-serif" font-size="32" font-weight="800" fill="#243041">Espagnol</text>
    <text x="772" y="712" font-family="Segoe UI, sans-serif" font-size="23" fill="#4b5f79">Même format que l'anglais.</text>
    <rect x="772" y="733" width="150" height="46" rx="12" fill="url(#soon)"/>
    <text x="812" y="763" font-family="Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#ffffff">Bientôt</text>
  </g>
</svg>
